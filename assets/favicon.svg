<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="36" y2="36">
      <stop offset="0" stop-color="#111113"/>
      <stop offset="1" stop-color="#0d0d0f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="36" y2="36">
      <stop offset="0" stop-color="#c9a84c"/>
      <stop offset="1" stop-color="#e8cc6e"/>
    </linearGradient>
  </defs>
  <rect width="36" height="36" rx="8" fill="url(#bg)"/>
