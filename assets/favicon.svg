  <path d="M13 9v18" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M13 18l9-9" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <path d="M13 18l9 9" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Precision nodes at endpoints -->
